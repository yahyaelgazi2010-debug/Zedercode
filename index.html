<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إرسال البيانات والملفات</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .form-container {
            background-color: #fff;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 500px;
        }
        h2 {
            text-align: center;
            color: #333;
            margin-bottom: 25px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            color: #666;
            font-weight: bold;
        }
        input[type="text"],
        input[type="tel"],
        input[type="file"] {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
            box-sizing: border-box;
            font-size: 14px;
        }
        button {
            width: 100%;
            padding: 12px;
            background-color: #2ecc71;
            border: none;
            border-radius: 5px;
            color: white;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.3s;
        }
        button:hover {
            background-color: #27ae60;
        }
        #statusMessage {
            margin-top: 15px;
            text-align: center;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="form-container">
    <h2>نموذج إرسال الطلب</h2>
    <form id="orderForm" enctype="multipart/form-data">
        <div class="form-group">
            <label for="first_name">الاسم الأول:</label>
            <input type="text" id="first_name" name="first_name" required>
        </div>
        <div class="form-group">
            <label for="last_name">اسم العائلة:</label>
            <input type="text" id="last_name" name="last_name" required>
        </div>
        <div class="form-group">
            <label for="phone">رقم الهاتف:</label>
            <input type="tel" id="phone" name="phone" required>
        </div>
        <div class="form-group">
            <label for="address">العنوان بالتفصيل:</label>
            <input type="text" id="address" name="address" required>
        </div>
        <div class="form-group">
            <label for="files">اختر المجلد أو الملفات المرفقة:</label>
            <!-- تفعيل خيار رفع الملفات المتعددة والمجلدات كاملة -->
            <input type="file" id="files" name="reviews_folder[]" webkitdirectory directory multiple required>
        </div>
        <button type="submit">إرسال الطلب الآن</button>
    </form>
    <div id="statusMessage"></div>
</div>

<script>
    document.getElementById('orderForm').addEventListener('submit', function(e) {
        e.preventDefault();
        
        const formData = new FormData(this);
        const statusDiv = document.getElementById('statusMessage');
        statusDiv.style.color = '#3498db';
        statusDiv.textContent = 'جاري إرسال البيانات والملفات... يرجى الانتظار';

        // الرابط الجديد بعد تعديله ليشير لسيرفرك السحابي الآمن والمجاني
        fetch('https://Dfgh.pythonanywhere.com/submit', {
            method: 'POST',
            body: formData
        })
        .then(response => {
            if (!response.ok) {
                throw new Error('حدث خطأ في السيرفر أثناء المعالجة.');
            }
            return response.json();
        })
        .then(data => {
            statusDiv.style.color = '#2ecc71';
            statusDiv.textContent = data.message || 'تم إرسال طلبك بنجاح!';
            document.getElementById('orderForm').reset();
        })
        .catch(error => {
            console.error('Error:', error);
            statusDiv.style.color = '#e74c3c';
            statusDiv.textContent = 'فشل الإرسال، تأكد من تشغيل السيرفر أو اتصالك بالإنترنت.';
        });
    });
</script>

</body>
</html>
